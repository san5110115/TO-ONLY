<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>生日快乐！彼小猫的秘密相册</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 启动覆盖层 -->
  <div id="start-overlay" class="overlay">
    <div class="start-box">
      <h1>🎉 生日快乐，彼小猫！</h1>
      <p>这是一份特殊的生日礼物，需要通过5个闯关挑战来逐步解锁照片。<br>准备好了吗？</p>
      <button id="start-btn">点击开始冒险</button>
    </div>
  </div>

  <!-- 游戏界面 -->
  <div id="game-container" class="game-container" style="display:none">
    <div class="game-header">
      <h2 id="level-title">关卡1：记忆翻牌</h2>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="level-description">找出所有匹配的卡片对</p>
    </div>
    
    <div id="game-content" class="game-content">
      <!-- 不同关卡的内容会动态插入这里 -->
    </div>
    
    <div class="game-footer">
      <button id="hint-btn" class="secondary-btn">💡 提示</button>
      <button id="restart-level-btn" class="secondary-btn">🔄 重新开始</button>
    </div>
  </div>

  <!-- 画廊界面（闯关完成后显示） -->
  <header id="gallery-header" class="controls" style="display:none">
    <div class="left">
      <button id="play-pause" title="播放/暂停">播放</button>
      <button id="mute-toggle" title="静音/取消静音">静音</button>
      <label>列数：
        <input id="cols" type="number" min="1" max="6" value="3" />
      </label>
      <button id="save-layout">保存布局 (下载)</button>
      <button id="restore-layout">恢复上次布局</button>
    </div>
    <div class="right">
      <small>🎂 完成挑战！现在可以欣赏你的相册了</small>
    </div>
  </header>

  <!-- 音频可视化 -->
  <canvas id="visual" width="800" height="120" style="display:none"></canvas>

  <main id="gallery-container" style="display:none">
    <section id="gallery" class="gallery" aria-label="图片画廊">
      <!-- 图片会通过脚本动态插入 -->
    </section>
  </main>

  <footer id="gallery-footer" class="footer" style="display:none">
    <p>✨ 恭喜！你已解锁所有照片。可以拖动调整顺序、双击编辑标题。</p>
  </footer>

  <!-- 背景音乐 -->
  <audio id="bg-audio" src="music.mp3" loop crossorigin="anonymous" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
